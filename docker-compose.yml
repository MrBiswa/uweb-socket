version: '3'
services:
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
    volumes:
      - ~/redis_data:/data

  socket-central-service:
    environment:
      - DOCKER_BUILDKIT=1
    build:
      context: .
    image: central-socket-service
    ports:
      - "8080-8081:8080-8081"